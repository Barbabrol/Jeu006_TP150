<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Temps Primitifs • Online English</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <header>
      <div class="header-main">
        <h1>Online English</h1>
        <p class="subtitle">Entraînement aux temps primitifs</p>
      </div>
      <div class="header-controls">
        <span id="versionTitle">Module standard (20 verbes)</span>
        <button id="themeToggle" aria-label="Changer de thème">🌙</button>
      </div>
    </header>

    <div class="search-container">
      <input type="text" id="search" placeholder="Rechercher un verbe (ex: be, faire)..." onkeyup="searchVerbs()">
    </div>

    <nav>
      <button onclick="showSection('list')" class="nav-btn">Liste</button>
      <button onclick="showSection('flashcards')" class="nav-btn">Flashcards</button>
      <button onclick="showSection('quiz')" class="nav-btn">Quiz MC</button>
      <button onclick="showSection('matching')" class="nav-btn">Matching</button>
      <button onclick="showSection('audioquiz')" class="nav-btn">Quiz Audio</button>
      <button onclick="showSection('stats')" class="nav-btn">Statistiques</button>
    </nav>

    <main>
      <div id="list" class="section active">
        <h2>Liste des verbes</h2>
        <div id="listContent"></div>
      </div>

      <div id="flashcards" class="section">
        <h2>Flashcards</h2>
        <div id="flashcard" class="card"></div>
        <div class="action-container">
          <button class="btn-primary" onclick="showFlashcard()">Nouvelle carte</button>
        </div>
      </div>

      <div id="quiz" class="section">
        <h2>Quiz Choix Multiples</h2>
        <div id="quizContent" class="quiz-container"></div>
        <div class="action-container">
          <button class="btn-primary" onclick="startQuiz()">Nouveau quiz</button>
        </div>
      </div>

      <div id="matching" class="section">
        <h2>Matching (Associer les paires)</h2>
        <div id="matchingContent">
          </div>
        <div class="action-container">
          <button class="btn-primary" onclick="startMatching()">Nouvelle partie</button>
        </div>
      </div>

      <div id="audioquiz" class="section">
        <h2>Quiz Audio</h2>
        <div id="audioQuizContent" class="quiz-container"></div>
        <div class="action-container">
          <button class="btn-primary" onclick="startAudioQuiz()">Nouveau quiz audio</button>
        </div>
      </div>

      <div id="stats" class="section">
        <h2>Vos Statistiques</h2>
        <div id="statsContent"></div>
      </div>
    </main>

    <footer>
      <div class="footer-stats">
        <span>Score : <strong id="totalScore">0</strong></span>
        <span>•</span>
        <span>Série actuelle : <strong id="streak">0</strong> 🔥</span>
      </div>
    </footer>
  </div>

  <script src="script.js"></script>
</body>
</html>
